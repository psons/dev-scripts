[pytest]
# pytest-bdd configuration for dtask tests

testpaths = tests
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Feature file base directory for pytest-bdd
# This tells pytest-bdd where .feature files are located
# relative to the pytest root (same as in pytest.ini location)
bdd_features_base_dir = tests/features

# Markers
markers =
    bdd: marks tests as BDD scenarios (deselect with '-m "not bdd"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
